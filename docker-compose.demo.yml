services:
  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    image: eom-mock-api:latest
    container_name: eom-mock-api
    restart: always
    ports:
      - '4000:3000'
    environment:
      MOCK_API_PORT: '3000'
      TZ: Asia/Jakarta
    networks:
      demo-network:
        aliases:
          - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Use same-origin API proxy so HTTPS/external domains do not call localhost.
        VITE_API_URL: /api
        VITE_APP_MODE: demo
        VITE_IT_SUPPORT_URL: ${VITE_IT_SUPPORT_URL:-}
        VITE_IT_SUPPORT_EMAIL: ${VITE_IT_SUPPORT_EMAIL:-}
    image: eom-web-demo:latest
    container_name: eom-web-demo
    restart: always
    ports:
      - '5173:5173'
    depends_on:
      - mock-api
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge
