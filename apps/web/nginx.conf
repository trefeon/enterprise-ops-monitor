server {
  listen 5173;
  server_name _;
  client_max_body_size 100M;

  root /usr/share/nginx/html;
  index index.html;

  # Baseline hardening for the SPA container.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # SPA routing — always re-fetch index.html so new routes are picked up.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Hashed assets — cache aggressively (filenames change on rebuild).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Same-origin API proxy (matches dashboard-web client default `/api`).
  location /api/ {
    # Keep the /api prefix when forwarding to the Express API.
    # With a trailing slash here, nginx would strip `/api/` and the API would see `/auth/...` (404).
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_request_buffering off;
  }

  # Agent updater binaries/scripts are served by the API static mount.
  location /agent_updates/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
