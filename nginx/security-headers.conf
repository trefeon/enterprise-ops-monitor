# Security Headers for Enterprise Ops Monitor
# Added: 2026-01-28

# HSTS - Force HTTPS for 1 year, include subdomains
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent embedding in frames (clickjacking protection)
add_header X-Frame-Options "DENY" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy - allow camera for QR scanning
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https: wss:; upgrade-insecure-requests; block-all-mixed-content;" always;
